name: Docker Build and Push
on:
  workflow_dispatch:
  push:
    branches: ["feature/**", "main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write  # nodig voor SARIF upload

env:
  DOTNET_VERSION: '10.x'

jobs:
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - project: BlazorWebAppWithKeycloak
            name: APP
            repository: ${{ vars.BLAZOR_REPOSITORY }}
          - project: BlazorWebAppWithKeycloak.API
            name: API
            repository: ${{ vars.API_REPOSITORY }}
    name: Build ${{ matrix.name }}
    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: GitVersion
        uses: dotnet/nbgv@master
        id: nbgv
        with:
          path: ${{ matrix.project }}

      # Stap 1 — Bouw lokaal, nog NIET naar registry
      - name: Build container image (local only)
        run: |
          dotnet publish ${{ matrix.project }}/${{ matrix.project }}.csproj \
            -c Release /t:PublishContainer \
            -p:ContainerRepository=${{ matrix.repository }} \
            -p:ContainerImageTags='"latest;${{ steps.nbgv.outputs.SemVer2 }}"'

      # Stap 2 — Scan het lokale image
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.repository }}:latest
          format: 'sarif'
          output: 'trivy-${{ matrix.name }}.sarif'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # Stap 3 — Upload resultaten naar GitHub Security tab
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # ook uploaden als de scan gefaald heeft
        with:
          sarif_file: 'trivy-${{ matrix.name }}.sarif'

      # Stap 4 — Alleen pushen als scan geslaagd is
      - name: Push container image to registry
        run: |
          docker tag ${{ matrix.repository }}:latest \
            ${{ secrets.CONTAINER_REGISTRY }}/${{ matrix.repository }}:latest

          docker tag ${{ matrix.repository }}:latest \
            ${{ secrets.CONTAINER_REGISTRY }}/${{ matrix.repository }}:${{ steps.nbgv.outputs.SemVer2 }}

          echo "${{ secrets.DOCKER_PASSWORD }}" | \
            docker login ${{ secrets.CONTAINER_REGISTRY }} \
            -u ${{ secrets.DOCKER_USER }} --password-stdin

          docker push ${{ secrets.CONTAINER_REGISTRY }}/${{ matrix.repository }}:latest
          docker push ${{ secrets.CONTAINER_REGISTRY }}/${{ matrix.repository }}:${{ steps.nbgv.outputs.SemVer2 }}

      # Stap 5 — Opruimen (optioneel maar netjes)
      - name: Remove local image
        if: always()
        run: |
          docker rmi ${{ matrix.repository }}:latest || true
          docker rmi ${{ matrix.repository }}:${{ steps.nbgv.outputs.SemVer2 }} || true